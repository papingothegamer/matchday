<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register — MatchDay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6e6e6; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 2rem; width: 100%; max-width: 380px; }
    .logo { font-size: 22px; font-weight: 700; color: #fff; text-align: center; margin-bottom: 1.5rem; }
    .logo span { color: #38a169; }
    label { font-size: 12px; color: #8b949e; display: block; margin-bottom: 5px; }
    input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6e6e6; font-size: 14px; padding: 9px 12px; outline: none; margin-bottom: 1rem; }
    input:focus { border-color: #58a6ff; }
    .btn { width: 100%; padding: 10px; background: #238636; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn:hover { background: #2ea043; }
    .error { background: #4a1a1a; border: 1px solid #f85149; border-radius: 6px; padding: 8px 12px; font-size: 13px; color: #f85149; margin-bottom: 1rem; }
    .hint { font-size: 11px; color: #484f58; margin-top: -10px; margin-bottom: 1rem; }
    .footer-link { text-align: center; margin-top: 1.25rem; font-size: 13px; color: #8b949e; }
    .footer-link a { color: #58a6ff; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Match<span>Day</span></div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post">
    {% csrf_token %}
    <label>Username</label>
    <input type="text" name="username" autofocus required>
    <label>Password</label>
    <input type="password" name="password" required>
    <p class="hint">At least 8 characters</p>
    <label>Confirm password</label>
    <input type="password" name="confirm" required>
    <button class="btn" type="submit">Create account</button>
  </form>
  <div class="footer-link">Already have an account? <a href="/auth/login/">Sign in</a></div>
</div>
</body>
</html>
