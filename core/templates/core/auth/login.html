{% extends 'core/base.html' %}
{% block title %}Login — MatchDay{% endblock %}
{% block content %}
<style>
  .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 75vh; }
  .auth-card { background: #161b22; border: 1px solid #30363d; padding: 3rem; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
  .auth-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #238636, #3fb950); }
  .auth-title { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 8px; text-align: center; text-transform: uppercase; letter-spacing: -0.5px;}
  .auth-subtitle { color: #8b949e; font-size: 14px; text-align: center; margin-bottom: 2rem; }
  .auth-form p { margin-bottom: 1rem; }
  .auth-form input[type="text"], .auth-form input[type="password"], .auth-form input[type="email"] { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; outline: none; transition: 0.2s; box-sizing: border-box; margin-top: 6px; }
  .auth-form input:focus { border-color: #3fb950; box-shadow: 0 0 0 3px rgba(63,185,80,0.15); }
  .auth-form label { display: block; font-size: 13px; color: #8b949e; font-weight: 600; }
  .auth-btn { width: 100%; background: #238636; color: #fff; font-weight: 700; font-size: 15px; border: none; border-radius: 8px; padding: 14px; cursor: pointer; transition: 0.2s; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .auth-btn:hover { background: #2ea043; transform: translateY(-1px); }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 13px; color: #8b949e; }
  .auth-footer a { color: #3fb950; text-decoration: none; font-weight: 600; }
  .auth-footer a:hover { text-decoration: underline; }
  .error-msg { color: #f85149; font-size: 13px; margin-bottom: 1rem; text-align: center; padding: 10px; background: rgba(248,81,73,0.1); border-radius: 6px; border: 1px solid #f85149; font-weight: 500;}
</style>
<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Log in to manage your MatchDay squad.</p>
    
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" class="auth-form">
      {% csrf_token %}
      
      <p>
        <label for="username">Username</label>
        <input type="text" name="username" id="username" required>
      </p>
      <p>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" required>
      </p>
      <button type="submit" class="auth-btn">Sign In</button>
    </form>
    
    <div class="auth-footer">
      Don't have an account? <a href="/auth/register/">Draft your team</a>
    </div>
  </div>
</div>
{% endblock %}
