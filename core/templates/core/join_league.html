{% extends 'core/base.html' %}
{% block title %}Join League — MatchDay{% endblock %}
{% block content %}
<div style="max-width:480px;">
  <h2 style="font-size:20px;font-weight:600;color:#fff;margin-bottom:1.5rem;">Join a mini-league</h2>
  {% if error %}<p style="color:#f85149;font-size:13px;margin-bottom:1rem;">{{ error }}</p>{% endif %}
  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom:1rem;">
      <label style="font-size:13px;color:#8b949e;display:block;margin-bottom:6px;">League code</label>
      <input type="text" name="code" placeholder="e.g. A3F9B2C1" required maxlength="8"
        style="width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6e6e6;font-size:14px;padding:9px 12px;outline:none;text-transform:uppercase;letter-spacing:2px;font-family:monospace;">
    </div>
    <button type="submit"
      style="width:100%;padding:10px;background:#238636;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:500;cursor:pointer;">
      Join league
    </button>
  </form>
</div>
{% endblock %}
