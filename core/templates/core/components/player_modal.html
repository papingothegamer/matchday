
<div id="player-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:99999; align-items:center; justify-content:center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(4px);">
    <div style="background:#161b22; border:1px solid #30363d; border-radius:12px; width:100%; max-width:550px; padding:24px; position:relative; max-height:85vh; display:flex; flex-direction:column; box-shadow: 0 10px 50px rgba(0,0,0,0.9);">
        <button onclick="closePlayerModal()" style="position:absolute; top:15px; right:20px; background:none; border:none; color:#8b949e; font-size:28px; cursor:pointer; line-height:1; transition: 0.2s;">&times;</button>
        
        <div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 15px;">
            <div>
                <h3 id="pm-name" style="color:#fff; margin-bottom:4px; font-size: 24px; font-weight: 700;">Loading...</h3>
                <div id="pm-meta" style="color:#8b949e; font-size:13px; font-weight:600; text-transform: uppercase; letter-spacing: 0.5px;">--</div>
            </div>
            <div style="text-align: right;">
                <div style="font-size: 11px; color: #8b949e; text-transform: uppercase;">Total Points</div>
                <div id="pm-total" style="color:#3fb950; font-size:24px; font-weight:800;">0</div>
            </div>
        </div>
        
        <div style="background: #0d1117; border: 1px solid #30363d; border-radius: 8px; overflow-y: auto;">
            <table style="width:100%; border-collapse:collapse; color:#e6e6e6; font-size:13px; text-align:left; min-width: 400px;">
                <thead style="position: sticky; top: 0; background: #21262d; box-shadow: 0 1px 0 #30363d;">
                    <tr style="color:#8b949e;">
                        <th style="padding:10px 12px; font-weight: 600;">GW</th>
                        <th style="padding:10px 12px; font-weight: 600;">OPP</th>
                        <th style="padding:10px 12px; font-weight: 600;">MIN</th>
                        <th style="padding:10px 12px; font-weight: 600;">G</th>
                        <th style="padding:10px 12px; font-weight: 600;">A</th>
                        <th style="padding:10px 12px; font-weight: 600; color: #fff;">PTS</th>
                    </tr>
                </thead>
                <tbody id="pm-history"></tbody>
            </table>
        </div>
    </div>
</div>
<script>
window.openPlayerModal = function(playerId) {
    if(!playerId || playerId === '0') return;
    document.getElementById('pm-name').textContent = "Loading...";
    document.getElementById('pm-total').textContent = "-";
    document.getElementById('pm-history').innerHTML = "";
    document.getElementById('player-modal').style.display = 'flex';
    
    fetch(`/api/player/${playerId}/`)
        .then(r => r.json())
        .then(d => {
            document.getElementById('pm-name').textContent = d.name;
            document.getElementById('pm-meta').textContent = `${d.team} | ${d.pos} | £${d.price.toFixed(1)}m`;
            document.getElementById('pm-total').textContent = d.total_pts;
            let rows = '';
            d.history.forEach(h => {
                rows += `<tr style="border-bottom:1px solid #21262d; transition: background 0.2s;" onmouseover="this.style.background='#161b22'" onmouseout="this.style.background='transparent'">
                    <td style="padding:10px 12px; color: #8b949e;">${h.gw}</td>
                    <td style="padding:10px 12px; font-weight: 500;">${h.opp}</td>
                    <td style="padding:10px 12px;">${h.mins}</td>
                    <td style="padding:10px 12px;">${h.goals}</td>
                    <td style="padding:10px 12px;">${h.assists}</td>
                    <td style="padding:10px 12px; font-weight:bold; color:#3fb950; font-size: 14px;">${h.pts}</td>
                </tr>`;
            });
            if(d.history.length === 0) rows = '<tr><td colspan="6" style="padding:24px; text-align:center; color:#8b949e;">No match history yet.</td></tr>';
            document.getElementById('pm-history').innerHTML = rows;
        }).catch(e => console.error("Modal Error:", e));
}
window.closePlayerModal = function() { document.getElementById('player-modal').style.display = 'none'; }
document.getElementById('player-modal').addEventListener('click', function(e) { if (e.target === this) window.closePlayerModal(); });
</script>
