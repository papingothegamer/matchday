<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MatchDay{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6e6e6; }
    .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 1.5rem; border-bottom: 1px solid #21262d; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .logo { font-size: 24px; font-weight: 600; color: #fff; letter-spacing: -0.5px; text-decoration: none; }
    .logo span { color: #38a169; }
    nav { display: flex; gap: 8px; flex-wrap: wrap; }
    nav a { font-size: 13px; color: #8b949e; text-decoration: none; padding: 5px 12px; border: 1px solid #30363d; border-radius: 6px; }
    nav a:hover { color: #e6e6e6; border-color: #8b949e; }
    .footer { padding-top: 1rem; border-top: 1px solid #21262d; font-size: 12px; color: #484f58; margin-top: 2rem; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <a href="/" class="logo">Match<span>Day</span></a>
    <nav>
      <a href="/">Home</a>
      <a href="/players/">Players</a>
      <a href="/leaderboard/">Leaderboard</a>
      <a href="/pick/">Pick Team</a>
      <a href="/admin/">Admin</a>
    </nav>
  </div>
  {% block content %}{% endblock %}
  <div class="footer">MatchDay &mdash; Premier League Fantasy &mdash; University of Lodz</div>
</div>
{% block extra_script %}{% endblock %}
</body>
</html>
